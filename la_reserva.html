	<script>
		// Disable pinch and double-tap zoom on iOS Safari without breaking scroll
		let lastTouchEnd = 0;

		document.addEventListener('touchmove', function (event) {
			if (event.scale && event.scale !== 1) {
				// Only prevent when actual pinch-zoom is happening
				event.preventDefault();
			}
		}, { passive: false });

		document.addEventListener('touchend', function (event) {
			const now = Date.now();
			if (now - lastTouchEnd <= 300) {
				event.preventDefault(); // prevent double-tap zoom
			}
			lastTouchEnd = now;
		}, false);
	</script>

	<script>
		const LEAGUE_ID = "la_reserva";
		const LEAGUE_API_URL = `https://copateur-mobile.github.io/copateur-mobile/leagues/${LEAGUE_ID}.json`;
		const TOURNAMENT_STORAGE_KEY = `selected_tournament_${LEAGUE_ID}`;
		const S3_APP_BASE_URL = "https://copateur-dev.s3.us-east-1.amazonaws.com/app";

		window.leagueData = null;

		async function fetchLeagueData() {
			const response = await fetch(LEAGUE_API_URL);
			if (!response.ok) {
				throw new Error(`HTTP ${response.status}`);
			}
			const rawData = await response.json();
			return normalizeLeagueData(rawData);
		}

		function resolveLogoUrl(logoPath) {
			if (!logoPath) return "";
			if (String(logoPath).startsWith("http")) return logoPath;
			return `${S3_APP_BASE_URL}/${String(logoPath).replace(/^\/+/, "")}`;
		}

		function parseEvents(rawEvents) {
			if (!rawEvents) return [];

			let events = rawEvents;
			if (typeof rawEvents === "string") {
				try {
					events = JSON.parse(rawEvents);
				} catch (e) {
					return [];
				}
			}

			if (!Array.isArray(events)) return [];

			const eventTypeMap = {
				gol: "goal",
				gol_penal: "penalty_goal",
				penal: "penalty_goal",
				t_amarilla: "yellow_card",
				amarilla: "yellow_card",
				t_roja: "red_card",
				roja: "red_card"
			};

			return events
				.map(ev => {
					const type = eventTypeMap[ev && ev.evento];
					if (!type) return null;
					return {
						player_name: (ev && ev.jugador) || "Jugador",
						type
					};
				})
				.filter(Boolean);
		}

		function normalizeCampeonato(campeonato) {
			const posiciones = Array.isArray(campeonato.posiciones) ? campeonato.posiciones : [];
			const goleadores = Array.isArray(campeonato.goleadores) ? campeonato.goleadores : [];
			const sancionados = Array.isArray(campeonato.sancionados) ? campeonato.sancionados : [];
			const fixtureFases = Array.isArray(campeonato.fixture) ? campeonato.fixture : [];

			const standings = posiciones
				.slice()
				.sort((a, b) => (b?.pivot?.puntos || 0) - (a?.pivot?.puntos || 0))
				.map((pos, index) => ({
					pos: index + 1,
					team_name: pos.equipo_nombre || "Equipo",
					team_logo_url: resolveLogoUrl(pos.escudo_img),
					pts: pos?.pivot?.puntos || 0,
					pj: pos?.pivot?.partidos_jugados || 0,
					pg: pos?.pivot?.partidos_ganados || 0,
					pe: pos?.pivot?.partidos_empatados || 0,
					pp: pos?.pivot?.partidos_perdidos || 0,
					gf: pos?.pivot?.goles_af || 0,
					gc: pos?.pivot?.goles_ac || 0,
					dg: pos?.diferencia_gol ?? 0
				}));

			const teamById = {};
			posiciones.forEach(team => {
				teamById[team.id] = team;
			});

			const top_scorers = goleadores
				.slice()
				.sort((a, b) => (b?.pivot?.jugador_goles || 0) - (a?.pivot?.jugador_goles || 0))
				.map((player, index) => {
					const team = teamById[player.equipo_id] || {};
					return {
						pos: index + 1,
						team_name: team.equipo_nombre || "Equipo",
						team_logo_url: resolveLogoUrl(team.escudo_img),
						player_name: `${player.nombre || ""} ${player.apellido || ""}`.trim() || "Jugador",
						goals: player?.pivot?.jugador_goles || 0
					};
				});

			const sanctions = sancionados.map(player => {
				const team = teamById[player.equipo_id] || {};
				const enabled = player?.pivot?.jugador_habilitado;
				return {
					team_name: team.equipo_nombre || "Equipo",
					team_logo_url: resolveLogoUrl(team.escudo_img),
					player_name: `${player.nombre || ""} ${player.apellido || ""}`.trim() || "Jugador",
					ta: player?.pivot?.jugador_amarillas || 0,
					tr: player?.pivot?.jugador_rojas || 0,
					status: enabled === 1 ? "Activo" : "Suspendido"
				};
			});

			const best_defense = standings
				.slice()
				.sort((a, b) => (a.gc || 0) - (b.gc || 0))
				.map((team, index) => ({
					pos: index + 1,
					team_name: team.team_name,
					team_logo_url: team.team_logo_url,
					gc: team.gc
				}));

			const fixtureMap = {};
			fixtureFases.forEach(fase => {
				const key = String(fase.fase_numero);
				fixtureMap[key] = (fase.partidos || []).map(partido => {
					const home = partido.equipo_1 || {};
					const away = partido.equipo_2 || {};
					const rawDateTime = String(partido.fecha_hora || partido.horario || "").trim();
					const stadiumRaw = String(partido.sede_nombre || partido.cancha || "").trim();

					return {
						status: partido.estado === "finalizado" ? "finished" : "pending",
						stadium: stadiumRaw && stadiumRaw !== "pendiente" ? stadiumRaw : null,
						date_time: rawDateTime || null,
						team_1: {
							team_name: home.nombre || "Equipo Local",
							team_logo_url: resolveLogoUrl(home.escudo_img),
							goals: home.goles,
							events: parseEvents(home.eventos)
						},
						team_2: {
							team_name: away.nombre || "Equipo Visitante",
							team_logo_url: resolveLogoUrl(away.escudo_img),
							goals: away.goles,
							events: parseEvents(away.eventos)
						}
					};
				});
			});

			const fixtureKeys = Object.keys(fixtureMap).sort((a, b) => Number(a) - Number(b));
			const currentFixtureDate = fixtureKeys.length ? Number(fixtureKeys[0]) : 1;

			return {
				tournament_id: campeonato.id,
				tournament_name: campeonato.nombre || "Torneo",
				standings,
				top_scorers,
				sanctions,
				best_defense,
				current_fixture_date: currentFixtureDate,
				fixtures: [fixtureMap]
			};
		}

		function normalizeLeagueData(rawData) {
			const campeonatos = Array.isArray(rawData.campeonatos) ? rawData.campeonatos : [];
			const tournaments = campeonatos.map(normalizeCampeonato);
			const firstRegulation = campeonatos[0] && campeonatos[0].reglamento;

			return {
				league_name: rawData.nombre_fantasia || "Liga",
				regulation: firstRegulation || "<p>Reglamento no disponible.</p>",
				tournaments,
				primary_nav: Array.isArray(rawData.primary_nav) ? rawData.primary_nav : []
			};
		}

		function showApiError(error) {
			console.error("Failed to load league data from API:", error);

			document.querySelector("#league_name").innerHTML = "Error de carga";
			document.querySelector("#regulation-content").innerHTML = `
				<div class="alert alert-danger" role="alert">
					No se pudo cargar la liga desde el API. Por favor intenta nuevamente en unos minutos.
				</div>
			`;

			document.querySelectorAll(".tournament_name").forEach(el => {
				el.innerHTML = "-";
			});

			document.querySelector(".x-table-standings tbody").innerHTML =
				'<tr><td colspan="10" class="text-center">Sin datos</td></tr>';
			document.querySelector(".x-table-top-scorers tbody").innerHTML =
				'<tr><td colspan="5" class="text-center">Sin datos</td></tr>';
			document.querySelector(".x-table-sanctions tbody").innerHTML =
				'<tr><td colspan="6" class="text-center">Sin datos</td></tr>';
			document.querySelector(".x-table-best-defense tbody").innerHTML =
				'<tr><td colspan="4" class="text-center">Sin datos</td></tr>';

			document.getElementById("fixtures-list").innerHTML =
				'<li class="widget-results__item"><div class="widget-results__content text-center">Sin partidos disponibles</div></li>';
		}

		// Main
		document.addEventListener("DOMContentLoaded", async () => {
			let loadedData;
			try {
				loadedData = await fetchLeagueData();
			} catch (error) {
				showApiError(error);
				return;
			}

			window.leagueData = loadedData;
			const tournaments = loadedData.tournaments || [];
			if (!tournaments.length) {
				showApiError(new Error("No tournaments found for this league"));
				return;
			}

			let currentTournament = tournaments[0];
			const savedTournamentIdOrName = localStorage.getItem(TOURNAMENT_STORAGE_KEY);
			if (savedTournamentIdOrName) {
				const savedTournament = tournaments.find(t =>
					String(t.tournament_id) === String(savedTournamentIdOrName) ||
					t.tournament_name === savedTournamentIdOrName
				);
				if (savedTournament) {
					currentTournament = savedTournament;
				}
			}

			document.querySelector("#league_name").innerHTML = loadedData['league_name'];
			document.querySelector("#regulation-content").innerHTML = loadedData['regulation'];

			// Fixture
			const fixtureSelect = document.querySelector('select[name="select_date"]');
			const fixtureList = document.getElementById('fixtures-list');
			const fixtureTemplate = document.getElementById("fixtures-template").innerHTML;
			const standingsTemplate = document.getElementById("standings-template").innerHTML;
			const topScorersTemplate = document.getElementById("top-scorers-template").innerHTML;
			const sanctionsTemplate = document.getElementById("sanctions-template").innerHTML;
			const bestDefenseTemplate = document.getElementById("best-defense-template").innerHTML;
			const tournamentModal = $('#tournamentModal');
			const tournamentModalContent = $('#tournamentModalContent');
			const tournamentModalTitle = document.getElementById("tournamentModalTitle");
			const tournamentBackBtn = document.getElementById("tournamentBackBtn");
			const navRoot = (loadedData.primary_nav && loadedData.primary_nav.length)
				? loadedData.primary_nav
				: tournaments.map(t => ({ text: t.tournament_name, id: t.tournament_id, isTournament: true }));
			let navStack = [{ title: "Seleccionar Torneo", nodes: navRoot }];

			function prepareFixtures(matches) {
				return matches.map(match => {
					const homeGoals = match.team_1.goals;
					const awayGoals = match.team_2.goals;

					match.is_finished = match.status === "finished";
					match.stadium = match.stadium || "Sin estadio";
					match.date_time = match.date_time ? match.date_time + "hs" : "Horario a confirmar";

					if (match.is_finished && homeGoals != null && awayGoals != null) {
						if (homeGoals > awayGoals) {
							match.team_1.score_class = "widget-results__score-winner";
							match.team_2.score_class = "widget-results__score-loser";
						} else if (homeGoals < awayGoals) {
							match.team_1.score_class = "widget-results__score-loser";
							match.team_2.score_class = "widget-results__score-winner";
						} else {
							match.team_1.score_class = match.team_2.score_class =
								"widget-results__score-loser";
						}
					}

					return match;
				});
			}

			function getCurrentFixtureMap() {
				return (currentTournament.fixtures && currentTournament.fixtures[0]) || {};
			}

			// Render fixture for selected date
			function renderFixtureFor(dateValue) {
				const fixtureMap = getCurrentFixtureMap();
				const matches = fixtureMap[dateValue];
				if (!matches) {
					fixtureList.innerHTML = "";
					return;
				}

				const preparedMatches = prepareFixtures(matches);

				const fixtureHtml = Mustache.render(fixtureTemplate, {
					matches: preparedMatches
				});

				fixtureList.innerHTML = fixtureHtml;

				const matchItems = fixtureList.querySelectorAll(".widget-results__item");

				matchItems.forEach((li, i) => {
					const match = preparedMatches[i];
					if (match) {
						li.dataset.status = match.status;
						li.dataset.match = JSON.stringify(match);
					}
				});
			}

			function nodeHasTournamentId(node) {
				return node && node.id !== "" && node.id !== null && node.id !== undefined;
			}

			function nodeChildren(node) {
				return Array.isArray(node && node.children) ? node.children : [];
			}

			function renderNavLevel() {
				const currentLevel = navStack[navStack.length - 1] || { title: "Seleccionar Torneo", nodes: [] };
				const nodes = currentLevel.nodes || [];

				if (!nodes.length) {
					tournamentModalContent.html('<p>No hay torneos o categorías en este nivel.</p>');
					tournamentModalTitle.textContent = currentLevel.title || "Seleccionar Torneo";
					tournamentBackBtn.style.display = navStack.length > 1 ? "block" : "none";
					return;
				}

				tournamentModalContent.html(`
					<div class="list-group" id="tournamentList">
						${nodes.map((node, idx) => {
							const isTournament = nodeHasTournamentId(node);
							const isSelected = isTournament && String(currentTournament.tournament_id) === String(node.id);
							return `
								<a href="#" class="list-group-item list-group-item-action nav-item ${isTournament ? "tournament-item" : "nav-category-item"} ${isSelected ? "active" : ""}" data-id="${node.id || ""}" data-idx="${idx}">
									${isTournament
										? `<i class="fas fa-trophy me-2" style="color:#e6b800;"></i> ${node.text || "Sin nombre"}`
										: `${node.text || "Sin nombre"} <i class="fas fa-chevron-right ms-2" style="color:#999;"></i>`}
								</a>
							`;
						}).join('')}
					</div>`);

				tournamentModalTitle.textContent = currentLevel.title || "Seleccionar Torneo";
				tournamentBackBtn.style.display = navStack.length > 1 ? "block" : "none";
			}

			function renderTournament(tournament) {
				currentTournament = tournament;
				localStorage.setItem(
					TOURNAMENT_STORAGE_KEY,
					currentTournament.tournament_id != null
						? String(currentTournament.tournament_id)
						: currentTournament.tournament_name
				);

				document.querySelectorAll(".tournament_name").forEach(el => {
					el.innerHTML = currentTournament.tournament_name;
				});

				const standingsHtml = Mustache.render(standingsTemplate, currentTournament);
				document.querySelector(".x-table-standings tbody").innerHTML = standingsHtml;

				const topScorersHtml = Mustache.render(topScorersTemplate, currentTournament);
				document.querySelector(".x-table-top-scorers tbody").innerHTML = topScorersHtml;

				const sanctionsHtml = Mustache.render(sanctionsTemplate, currentTournament);
				document.querySelector(".x-table-sanctions tbody").innerHTML = sanctionsHtml;

				const bestDefenseHtml = Mustache.render(bestDefenseTemplate, currentTournament);
				document.querySelector(".x-table-best-defense tbody").innerHTML = bestDefenseHtml;

				const fixtureMap = getCurrentFixtureMap();
				const fixtureKeys = Object.keys(fixtureMap).sort((a, b) => Number(a) - Number(b));

				fixtureSelect.innerHTML = fixtureKeys.map(key =>
					`<option value="${key}">Fecha ${key}</option>`
				).join("");

				const defaultFixture = String(
					fixtureKeys.includes(String(currentTournament.current_fixture_date))
						? currentTournament.current_fixture_date
						: fixtureKeys[0]
				);

				fixtureSelect.value = defaultFixture;
				renderFixtureFor(defaultFixture);
			}

			// Initial render using saved tournament (if any)
			renderTournament(currentTournament);

			// Handle select change
			fixtureSelect.addEventListener('change', (e) => {
				renderFixtureFor(e.target.value);
			});

			// Bootstrap 4 modal handling
			const modalEl = $('#matchModal');
			const modalContent = $('#matchModalContent');

			$(document).on('click', '.close-modal-btn', function(e) {
				e.preventDefault();
				e.stopPropagation();
				$(this).closest('.modal').modal('hide');
			});

			// Convert event type → HTML icon
			function renderEventIcon(type) {
				switch (type) {
					case 'goal': return '<i class="icon-svg icon-soccer-ball"></i>';
					case 'penalty_goal': return '<i class="icon-svg icon-soccer-ball"></i> (P)';
					case 'red_card': return '<i class="icon-svg icon-red-card"></i>';
					case 'yellow_card': return '<i class="icon-svg icon-yellow-card"></i>';
					default: return '';
				}
			}

			// Open modal dynamically
			function openMatchModal(matchData) {
				const t1 = matchData.team_1;
				const t2 = matchData.team_2;

				// Generate icons based on event type
				function getEventIcon(ev) {
					switch (ev.type) {
						case 'goal': return '<i class="icon-svg icon-soccer-ball"></i>';
						case 'penalty_goal': return '<i class="icon-svg icon-soccer-ball"></i>';
						case 'red_card': return '<i class="icon-svg icon-red-card"></i>';
						case 'yellow_card': return '<i class="icon-svg icon-yellow-card"></i>';
						default: return '';
					}
				}

				function renderTeamEvents(events, alignRight = false) {
					if (!events || !events.length) return '<em>Sin eventos</em>';

					return `
						<div class="alc-event-header-performances-list" style="display:flex; flex-direction:column; gap:4px;">
							${events.map(ev => {
								let text = ev.player_name;
								if (ev.type === 'penalty_goal') text += ' (P)';
								return `
									<div class="alc-event-header__performance"
											style="display:block; text-align:${alignRight ? 'right' : 'left'};">
										${`${text} ${getEventIcon(ev)}`}
									</div>`;
							}).join('')}
						</div>`;
				}

				const modalHTML = `
					<div class="alc-event-header alc-event-header--layout-2">
						<div class="alc-event-header__top">
							<div class="container text-center">
								<h6 class="title">${matchData.stadium || ''}</h6>
								<span class="subtitle">
									${matchData.date_time || ''}
								</span>
							</div>
						</div>

						<div class="alc-event-header__content">
							<div class="container">
								<div class="alc-event-header__content-inner">
									<div class="alc-event-competitors">

										<!-- Team #1 -->
										<div class="alc-event-competitors__item alc-event-team ${t1.goals > t2.goals ? 'alc-event-team--winner' : ''}">
											<div class="alc-event-team__logo-alt">
												<div class="alc-event-team__logo-alt-inner">
													<img src="${t1.team_logo_url}" alt="${t1.team_name}" class="alc-event-team__logo-alt-img">
												</div>
											</div>
											<div class="alc-event-team__details">
												<h4 class="alc-event-team__name">${t1.team_name}</h4>
											</div>
											<figure class="alc-event-team__logo">
												<img src="${t1.team_logo_url}" alt="">
											</figure>
											<div class="alc-event-team__score-wrap">
												<div class="alc-event-team__score">${t1.goals ?? '-'}</div>
											</div>
										</div>
										<!-- /Team #1 -->

										<!-- Team #2 -->
										<div class="alc-event-competitors__item alc-event-team ${t2.goals > t1.goals ? 'alc-event-team--winner' : ''}">
											<div class="alc-event-team__logo-alt alc-event-team__logo-alt--color-alt">
												<div class="alc-event-team__logo-alt-inner">
													<img src="${t2.team_logo_url}" alt="${t2.team_name}" class="alc-event-team__logo-alt-img">
												</div>
											</div>
											<div class="alc-event-team__details">
												<h4 class="alc-event-team__name">${t2.team_name}</h4>
											</div>
											<figure class="alc-event-team__logo">
												<img src="${t2.team_logo_url}" alt="">
											</figure>
											<div class="alc-event-team__score-wrap">
												<div class="alc-event-team__score">${t2.goals ?? '-'}</div>
											</div>
										</div>
										<!-- /Team #2 -->

										<div class="alc-event-competitors__divider"></div>
									</div>
								</div>
							</div>
						</div>

						<div class="alc-event-header__bottom">
							<div class="container">
								<div class="row">
									<div class="col-6">
										<div class="alc-event-header-performances">
											${renderTeamEvents(t1.events)}
										</div>
									</div>
									<div class="col-6">
										<div class="alc-event-header-performances">
											${renderTeamEvents(t2.events, true)}
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>`;
				modalContent.html(modalHTML);
				modalEl.modal('show');
			}

			// Click listener for all matches (finished or pending)
			document.getElementById('fixtures-list').addEventListener('click', e => {
				const item = e.target.closest('.widget-results__item');
				if (!item) return;

				const matchData = JSON.parse(item.dataset.match);
				openMatchModal(matchData);
			});

			// Open tournament modal
			$('#openTournamentModal').on('click', function() {
				navStack = [{ title: "Seleccionar Torneo", nodes: navRoot }];
				renderNavLevel();
				tournamentModal.modal('show');
			});

			// Close modal button
			$(document).on('click', '#tournamentModal .close-modal-btn', function() {
				tournamentModal.modal('hide');
			});

			// Tournament selection
			$(document).on('click', '.tournament-item', function(e) {
				e.preventDefault();
				e.stopPropagation();
				e.stopImmediatePropagation();
				const tournamentId = $(this).data('id');
				const selectedTournament = tournaments.find(t => String(t.tournament_id) === String(tournamentId));
				if (!selectedTournament) return;

				renderTournament(selectedTournament);
				tournamentModal.modal('hide');
			});

			// Navigate deeper into nested categories
			$(document).on('click', '.nav-category-item', function(e) {
				e.preventDefault();
				e.stopPropagation();
				e.stopImmediatePropagation();
				const nodeIndex = Number($(this).data('idx'));
				const currentLevel = navStack[navStack.length - 1] || { nodes: [] };
				const nextNode = (currentLevel.nodes || [])[nodeIndex];
				const categoryText = String((nextNode && nextNode.text) || "Categoría");
				const children = nodeChildren(nextNode);
				if (!children.length) return;

				navStack.push({ title: categoryText, nodes: children });
				renderNavLevel();
			});

			// Back to previous nav level
			$(document).on('click', '#tournamentBackBtn', function(e) {
				e.preventDefault();
				e.stopPropagation();
				e.stopImmediatePropagation();
				if (navStack.length <= 1) return;
				navStack.pop();
				renderNavLevel();
			});

	    // TABS
		  const tabs = document.querySelectorAll(".content-filter__link");
		  const cards = document.querySelectorAll(".card-container");

		  tabs.forEach(tab => {
		    tab.addEventListener("click", e => {
		      e.preventDefault();

		      // 1. Remove active class from all tabs
		      document.querySelectorAll(".content-filter__item")
		        .forEach(item => item.classList.remove("content-filter__item--active"));

		      // 2. Hide all cards
		      cards.forEach(card => card.style.display = "none");

		      // 3. Add active class to clicked tab's parent <li>
		      tab.parentElement.classList.add("content-filter__item--active");

		      // 4. Show the corresponding card
		      const key = tab.classList[1]; // e.g. "standings", "top-scorers"...
		      const cardToShow = document.querySelector(`.card-container.${key}`);
		      if (cardToShow) cardToShow.style.display = "block";
		      document.querySelector(".content-filter__toggle").classList.remove("content-filter__toggle--active");
		      document.querySelector(".content-filter__list").classList.remove("content-filter__list--expanded");
		    });
		  });

		  // Optionally: hide all but the first card on load
		  cards.forEach((card, i) => card.style.display = i === 0 ? "block" : "none");
		});

		$(document).on('show.bs.modal', function (e) {
			$('.modal').not($(e.target)).modal('hide');
		});

		document.addEventListener('click', function (e) {
			const path = typeof e.composedPath === "function" ? e.composedPath() : [];
			const clickedInsideDialog = path.some(node =>
				node && node.classList && node.classList.contains('modal-dialog')
			);

			// Keep modal open when clicking inside any modal dialog.
			if (clickedInsideDialog) {
				return;
			}

			document.querySelectorAll('.modal.show').forEach(modal => {
				$(modal).modal('hide');
			});
		});
	</script>

</body>
</html>
