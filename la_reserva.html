	<script>
		// Disable pinch and double-tap zoom on iOS Safari without breaking scroll
		let lastTouchEnd = 0;

		document.addEventListener('touchmove', function (event) {
			if (event.scale && event.scale !== 1) {
				// Only prevent when actual pinch-zoom is happening
				event.preventDefault();
			}
		}, { passive: false });

		document.addEventListener('touchend', function (event) {
			const now = Date.now();
			if (now - lastTouchEnd <= 300) {
				event.preventDefault(); // prevent double-tap zoom
			}
			lastTouchEnd = now;
		}, false);
	</script>

	<script>
		const LEAGUE_ID = "la_reserva";
		const S3_APP_BASE_URL = "https://io-copateur-prod.s3.us-east-1.amazonaws.com/app";
		const LEAGUE_API_URL = `${S3_APP_BASE_URL}/${LEAGUE_ID}.json`;
		const TOURNAMENT_STORAGE_KEY = `selected_tournament_${LEAGUE_ID}`;
		const PLAYER_FALLBACK_PHOTO = "assets/images/player-placeholder-26x26.png";
		const tournamentDataCache = new Map();

		window.leagueData = null;

		async function fetchLeagueData() {
			const response = await fetch(`${LEAGUE_API_URL}?t=${Date.now()}`, {
				cache: "no-store",
				headers: {
					"Cache-Control": "no-cache"
				}
			});
			if (!response.ok) {
				throw new Error(`HTTP ${response.status}`);
			}
			const rawData = await response.json();
			return normalizeLeagueData(rawData);
		}

		function tournamentApiUrl(tournamentId) {
			return `${S3_APP_BASE_URL}/${LEAGUE_ID}_tournament_${encodeURIComponent(tournamentId)}.json`;
		}

		async function fetchTournamentData(tournamentSummary) {
			const tournamentId = tournamentSummary?.tournament_id ?? tournamentSummary?.id;
			if (tournamentId === undefined || tournamentId === null || tournamentId === "") {
				throw new Error("Tournament id missing");
			}

			const cacheKey = String(tournamentId);
			if (tournamentDataCache.has(cacheKey)) {
				return tournamentDataCache.get(cacheKey);
			}

			if (hasTournamentDetail(tournamentSummary)) {
				const normalizedTournament = normalizeNormalizedTournament(tournamentSummary);
				tournamentDataCache.set(cacheKey, normalizedTournament);
				return normalizedTournament;
			}

			const response = await fetch(`${tournamentApiUrl(tournamentId)}?t=${Date.now()}`, {
				cache: "no-store",
				headers: {
					"Cache-Control": "no-cache"
				}
			});
			if (!response.ok) {
				throw new Error(`HTTP ${response.status}`);
			}

			const rawTournament = await response.json();
			const normalizedTournament = normalizeTournamentPayload(rawTournament, tournamentSummary);
			tournamentDataCache.set(cacheKey, normalizedTournament);
			return normalizedTournament;
		}

		function resolveLogoUrl(logoPath) {
			if (!logoPath) return "";
			if (String(logoPath).startsWith("http")) return logoPath;
			return `${S3_APP_BASE_URL}/${String(logoPath).replace(/^\/+/, "")}`;
		}

		function resolvePlayerPhotoUrl(photoPath) {
			if (!photoPath) return PLAYER_FALLBACK_PHOTO;
			if (String(photoPath).startsWith("http")) return photoPath;
			if (String(photoPath).startsWith("assets/") || String(photoPath).startsWith("/assets/")) {
				return String(photoPath).replace(/^\/+/, "");
			}
			return resolveLogoUrl(photoPath) || PLAYER_FALLBACK_PHOTO;
		}

		function resolvePersonName(record) {
			const firstLastName = `${record?.nombre || ""} ${record?.apellido || ""}`.trim();
			return (
				record?.player_name ||
				record?.jugador_nombre ||
				record?.nombre_jugador ||
				record?.jugador ||
				record?.arquero_nombre ||
				record?.portero_nombre ||
				record?.goalkeeper_name ||
				record?.keeper_name ||
				firstLastName
			);
		}

		function resolvePersonPhotoUrl(record) {
			return resolvePlayerPhotoUrl(
				record?.player_photo_url ||
				record?.jugador_foto_perfil ||
				record?.foto_perfil ||
				record?.foto ||
				record?.foto_url ||
				record?.arquero_foto ||
				record?.portero_foto ||
				record?.goalkeeper_photo_url ||
				record?.keeper_photo_url
			);
		}

		function resolvePlayerId(record, allowRecordId = false) {
			const rawId = record && (
				record.player_id ??
				record.jugador_id ??
				record.id_jugador ??
				(allowRecordId ? record.id : null)
			);

			if (rawId === undefined || rawId === null || rawId === "") return null;
			return String(rawId);
		}

		function normalizeBestDefenseEntry(entry, index) {
			const playerName = resolvePersonName(entry);

			return {
				...entry,
				pos: entry?.pos || index + 1,
				team_name: entry?.team_name || entry?.equipo_nombre || entry?.equipo || "Equipo",
				team_logo_url: resolveLogoUrl(entry?.team_logo_url || entry?.escudo_img || entry?.logo_url),
				player_name: playerName,
				player_photo_url: playerName ? resolvePersonPhotoUrl(entry) : "",
				gc: entry?.gc ?? entry?.goles_recibidos ?? entry?.goles_ac ?? entry?.goles_en_contra ?? 0
			};
		}

		function parseEvents(rawEvents) {
			if (!rawEvents) return [];

			let events = rawEvents;
			if (typeof rawEvents === "string") {
				try {
					events = JSON.parse(rawEvents);
				} catch (e) {
					return [];
				}
			}

			if (!Array.isArray(events)) return [];

			const eventTypeMap = {
				gol: "goal",
				gol_penal: "penalty_goal",
				penal: "penalty_goal",
				t_amarilla: "yellow_card",
				amarilla: "yellow_card",
				t_roja: "red_card",
				roja: "red_card"
			};

			return events
				.map(ev => {
					const rawType = ev && (ev.type || ev.evento);
					const type = eventTypeMap[rawType] || rawType;
					if (!type) return null;
					const rawPhoto = ev && (
						ev.player_photo_url ||
						ev.jugador_foto_perfil ||
						ev.foto_perfil ||
						ev.foto ||
						ev.foto_url
					);

					return {
						player_id: resolvePlayerId(ev),
						player_name: (ev && (ev.player_name || ev.jugador)) || "Jugador",
						player_photo_url: rawPhoto ? resolvePlayerPhotoUrl(rawPhoto) : "",
						team_id: ev && (ev.team_id ?? ev.equipo_id) || null,
						instance_id: ev && (ev.instance_id ?? ev.instancia_id) || null,
						type
					};
				})
				.filter(Boolean);
		}

		function normalizeCampeonato(campeonato) {
			const posiciones = Array.isArray(campeonato.posiciones) ? campeonato.posiciones : [];
			const goleadores = Array.isArray(campeonato.goleadores) ? campeonato.goleadores : [];
			const sancionados = Array.isArray(campeonato.sancionados) ? campeonato.sancionados : [];
			const fixtureFases = Array.isArray(campeonato.fixture) ? campeonato.fixture : [];

			const standings = posiciones
				.slice()
				.sort((a, b) => (b?.pivot?.puntos || 0) - (a?.pivot?.puntos || 0))
				.map((pos, index) => ({
					pos: index + 1,
					team_id: pos.id || null,
					team_name: pos.equipo_nombre || "Equipo",
					team_logo_url: resolveLogoUrl(pos.escudo_img),
					pts: pos?.pivot?.puntos || 0,
					pj: pos?.pivot?.partidos_jugados || 0,
					pg: pos?.pivot?.partidos_ganados || 0,
					pe: pos?.pivot?.partidos_empatados || 0,
					pp: pos?.pivot?.partidos_perdidos || 0,
					gf: pos?.pivot?.goles_af || 0,
					gc: pos?.pivot?.goles_ac || 0,
					dg: pos?.diferencia_gol ?? 0
				}));

			const teamById = {};
			posiciones.forEach(team => {
				teamById[team.id] = team;
			});

			const top_scorers = goleadores
				.slice()
				.sort((a, b) => (b?.pivot?.jugador_goles || 0) - (a?.pivot?.jugador_goles || 0))
				.map((player, index) => {
					const team = teamById[player.equipo_id] || {};
					return {
						pos: index + 1,
						team_name: team.equipo_nombre || "Equipo",
						team_logo_url: resolveLogoUrl(team.escudo_img),
						player_id: resolvePlayerId(player, true),
						player_name: `${player.nombre || ""} ${player.apellido || ""}`.trim() || "Jugador",
						player_photo_url: resolvePlayerPhotoUrl(player.foto_perfil || player.foto || player.foto_url),
						goals: player?.pivot?.jugador_goles || 0
					};
				});

			const sanctions = sancionados.map(player => {
				const team = teamById[player.equipo_id] || {};
				const enabled = player?.pivot?.jugador_habilitado;
				return {
					team_id: player.equipo_id || null,
					team_name: team.equipo_nombre || "Equipo",
					team_logo_url: resolveLogoUrl(team.escudo_img),
					player_id: resolvePlayerId(player, true),
					player_name: `${player.nombre || ""} ${player.apellido || ""}`.trim() || "Jugador",
					player_photo_url: resolvePlayerPhotoUrl(player.foto_perfil || player.foto || player.foto_url),
					ta: player?.pivot?.jugador_amarillas || 0,
					tr: player?.pivot?.jugador_rojas || 0,
					status: enabled === 1 ? "Activo" : "Suspendido",
					suspension_remaining: enabled === 1 ? 0 : 1,
					suspension_total: enabled === 1 ? 0 : 1
				};
			});

			const best_defense = standings
				.slice()
				.sort((a, b) => (a.gc || 0) - (b.gc || 0))
				.map(normalizeBestDefenseEntry);
			const normalizedSanctions = sanctions.map(normalizeSanction);
			const suspended = normalizedSanctions.filter(player =>
				String(player.status || "").toLowerCase().includes("suspend")
			);
			const fair_play = buildFairPlayStandings(standings, normalizedSanctions);

			const fixtureMap = {};
			fixtureFases.forEach(fase => {
				const key = String(fase.fase_numero);
				fixtureMap[key] = (fase.partidos || []).map(partido => {
					const home = partido.equipo_1 || {};
					const away = partido.equipo_2 || {};
					const rawDateTime = String(partido.fecha_hora || partido.horario || "").trim();
					const stadiumRaw = String(partido.sede_nombre || partido.cancha || "").trim();

					return {
						status: partido.estado === "finalizado" ? "finished" : "pending",
						stadium: stadiumRaw && stadiumRaw !== "pendiente" ? stadiumRaw : null,
						date_time: rawDateTime || null,
						team_1: {
							team_name: home.nombre || "Equipo Local",
							team_logo_url: resolveLogoUrl(home.escudo_img),
							goals: home.goles,
							events: parseEvents(home.eventos)
						},
						team_2: {
							team_name: away.nombre || "Equipo Visitante",
							team_logo_url: resolveLogoUrl(away.escudo_img),
							goals: away.goles,
							events: parseEvents(away.eventos)
						}
					};
				});
			});

			const fixtureKeys = Object.keys(fixtureMap).sort((a, b) => Number(a) - Number(b));
			const currentFixtureDate = fixtureKeys.length ? Number(fixtureKeys[0]) : 1;

			return {
				tournament_id: campeonato.id,
				tournament_name: campeonato.nombre || "Campeonato",
				standings,
				top_scorers,
				figures: [],
				sanctions: normalizedSanctions,
				suspended,
				fair_play,
				best_defense,
				current_fixture_date: currentFixtureDate,
				fixtures: [fixtureMap]
			};
		}

		function normalizeSanction(sanction) {
			const status = sanction.status || "";
			const remainingValue = Number(
				sanction.suspension_remaining ??
				sanction.remaining ??
				sanction.restan
			);
			const totalValue = Number(
				sanction.suspension_total ??
				sanction.total ??
				sanction.cant_fechas_aplicadas
			);
			const fallbackRemaining = String(status).toLowerCase().includes("suspend") ? 1 : 0;
			const suspensionRemaining = Number.isFinite(remainingValue)
				? remainingValue
				: fallbackRemaining;
			const suspensionTotal = Number.isFinite(totalValue)
				? totalValue
				: suspensionRemaining;

			return {
				...sanction,
				status,
				player_id: resolvePlayerId(sanction, true),
				player_photo_url: resolvePlayerPhotoUrl(
					sanction.player_photo_url || sanction.foto_perfil || sanction.foto || sanction.foto_url
				),
				suspension_remaining: suspensionRemaining,
				suspension_total: suspensionTotal
			};
		}

		function buildFairPlayStandings(standings, sanctions) {
			const cardsByTeam = new Map();

			sanctions.forEach(sanction => {
				const key = String(sanction.team_id || sanction.team_name || "");
				const totals = cardsByTeam.get(key) || { ta: 0, tr: 0 };
				totals.ta += Number(sanction.ta || 0);
				totals.tr += Number(sanction.tr || 0);
				cardsByTeam.set(key, totals);
			});

			return standings
				.map(team => {
					const key = String(team.team_id || team.team_name || "");
					const cards = cardsByTeam.get(key) || { ta: 0, tr: 0 };
					const ta = Number(cards.ta || 0);
					const tr = Number(cards.tr || 0);

					return {
						team_id: team.team_id || null,
						team_name: team.team_name,
						team_logo_url: team.team_logo_url,
						pj: Number(team.pj || 0),
						ta,
						tr,
						pts: ta + (tr * 2)
					};
				})
				.sort((a, b) =>
					(a.pts - b.pts) ||
					(a.ta - b.ta) ||
					(a.tr - b.tr) ||
					String(a.team_name).localeCompare(String(b.team_name))
				)
				.map((team, index) => ({ ...team, pos: index + 1 }));
		}

		function hasTournamentDetail(tournament) {
			return !!(
				tournament &&
				(
					Array.isArray(tournament.standings) ||
					Array.isArray(tournament.posiciones) ||
					Array.isArray(tournament.fixtures) ||
					Array.isArray(tournament.fixture) ||
					tournament.stats ||
					tournament.fair_play
				)
			);
		}

		function normalizeTournamentSummary(tournament) {
			return {
				tournament_id: tournament?.tournament_id ?? tournament?.id,
				tournament_name: tournament?.tournament_name || tournament?.nombre || tournament?.text || "Campeonato"
			};
		}

		function normalizeTournamentPayload(rawTournament, fallbackSummary = {}) {
			const source = rawTournament && rawTournament.tournament
				? rawTournament.tournament
				: (rawTournament || {});
			const mergedTournament = {
				...fallbackSummary,
				...source,
				tournament_id: source?.tournament_id ?? source?.id ?? fallbackSummary?.tournament_id ?? fallbackSummary?.id,
				tournament_name: source?.tournament_name || source?.nombre || fallbackSummary?.tournament_name || fallbackSummary?.nombre || "Campeonato"
			};

			return normalizeNormalizedTournament(mergedTournament);
		}

		function sortedFixtureKeys(fixtureMap) {
			return Object.keys(fixtureMap || {}).sort((a, b) => {
				const numericA = Number(a);
				const numericB = Number(b);

				if (Number.isFinite(numericA) && Number.isFinite(numericB)) {
					return numericA - numericB;
				}

				return String(a).localeCompare(String(b), undefined, { numeric: true });
			});
		}

		function normalizeFixtureRounds(tournament, fixtureMap) {
			const availableKeys = new Set(Object.keys(fixtureMap || {}));
			const rawRounds = Array.isArray(tournament.fixture_rounds)
				? tournament.fixture_rounds
				: [];
			const rounds = rawRounds
				.map((round, index) => {
					const key = String(
						round?.key ??
						round?.value ??
						round?.id ??
						round?.phase_number ??
						round?.fase_numero ??
						index + 1
					);

					return {
						...(round || {}),
						key,
						label: round?.label || `Fecha ${key}`
					};
				})
				.filter(round => availableKeys.has(round.key));

			if (rounds.length) return rounds;

			return sortedFixtureKeys(fixtureMap).map(key => ({
				key: String(key),
				label: `Fecha ${key}`
			}));
		}

		function normalizeNormalizedTournament(tournament) {
			const fixtures = Array.isArray(tournament.fixtures)
				? tournament.fixtures
				: [tournament.fixtures || {}];
			const fixtureMap = fixtures[0] || {};
			const fixtureRounds = normalizeFixtureRounds(tournament, fixtureMap);
			const standings = Array.isArray(tournament.standings) ? tournament.standings : [];
			const stats = tournament.stats || {};
			const fairPlayData = tournament.fair_play || {};
			const rawSanctions = Array.isArray(fairPlayData.cards)
				? fairPlayData.cards
				: (Array.isArray(tournament.sanctions) ? tournament.sanctions : []);
			const sanctions = rawSanctions.map(normalizeSanction);
			const suspended = Array.isArray(fairPlayData.suspended)
				? fairPlayData.suspended.map(normalizeSanction)
				: (Array.isArray(tournament.suspended)
					? tournament.suspended.map(normalizeSanction)
					: sanctions.filter(player => String(player.status || "").toLowerCase().includes("suspend")));
			const fairPlayStandings = Array.isArray(fairPlayData.standings) && fairPlayData.standings.length
				? fairPlayData.standings
				: buildFairPlayStandings(standings, sanctions);
			const bestDefenseSource = Array.isArray(stats.best_defense) && stats.best_defense.length
				? stats.best_defense
				: tournament.best_defense;
			const bestDefense = Array.isArray(bestDefenseSource) && bestDefenseSource.length
				? bestDefenseSource.map(normalizeBestDefenseEntry)
				: standings
					.slice()
					.sort((a, b) => (a.gc || 0) - (b.gc || 0))
					.map(normalizeBestDefenseEntry);
			const topScorers = (Array.isArray(stats.top_scorers)
				? stats.top_scorers
				: (Array.isArray(tournament.top_scorers) ? tournament.top_scorers : []))
				.map(player => ({
					...player,
					player_id: resolvePlayerId(player, true),
					player_name: player.player_name || resolvePersonName(player) || "Jugador",
					player_photo_url: resolvePersonPhotoUrl(player)
				}));

			return {
				tournament_id: tournament.tournament_id ?? tournament.id,
				tournament_name: tournament.tournament_name || tournament.nombre || "Campeonato",
				standings,
				top_scorers: topScorers,
				figures: Array.isArray(stats.figures) ? stats.figures : (Array.isArray(tournament.figures) ? tournament.figures : []),
				sanctions,
				suspended,
				fair_play: fairPlayStandings,
				best_defense: bestDefense,
				fixture_rounds: fixtureRounds,
				current_fixture_date: tournament.current_fixture_date || (fixtureRounds.length ? fixtureRounds[0].key : 1),
				fixtures
			};
		}

		function normalizeLeagueData(rawData) {
			const hasNormalizedTournaments = Array.isArray(rawData.tournaments);
			const rawTournaments = hasNormalizedTournaments
				? rawData.tournaments
				: (Array.isArray(rawData.campeonatos) ? rawData.campeonatos : []).map(normalizeCampeonato);
			const tournaments = rawTournaments.map(tournament => {
				if (hasTournamentDetail(tournament)) {
					const normalizedTournament = normalizeNormalizedTournament(tournament);
					if (normalizedTournament.tournament_id !== undefined && normalizedTournament.tournament_id !== null) {
						tournamentDataCache.set(String(normalizedTournament.tournament_id), normalizedTournament);
					}
					return normalizeTournamentSummary(normalizedTournament);
				}

				return normalizeTournamentSummary(tournament);
			});
			const campeonatos = Array.isArray(rawData.campeonatos) ? rawData.campeonatos : [];
			const firstRegulation = campeonatos[0] && campeonatos[0].reglamento;

			return {
				league_name: rawData.league_name || rawData.nombre_fantasia || "Liga",
				main_color: /^#[0-9a-fA-F]{6}$/.test(rawData.main_color || "")

				logo_url: resolveLogoUrl(

				tournaments,
				primary_nav: Array.isArray(rawData.primary_nav) ? rawData.primary_nav : []
			};
		}

			function prepareFixtures(matches) {

					const awayGoals = match.team_2.goals;

					match.is_finished = match.status === "finished";
					match.stadium = match.stadium || "Sin estadio";
					match.date_time = match.date_time ? match.date_time + "hs" : "Horario a confirmar";

					if (match.is_finished && homeGoals != null && awayGoals != null) {
						if (homeGoals > awayGoals) {
							match.team_1.score_class = "widget-results__score-winner";
							match.team_2.score_class = "widget-results__score-loser";
						} else if (homeGoals < awayGoals) {
							match.team_1.score_class = "widget-results__score-loser";
							match.team_2.score_class = "widget-results__score-winner";
						} else {
							match.team_1.score_class = match.team_2.score_class =
								"widget-results__score-loser";

					}

					return match;
				});

			async function loadAndRenderTournament(tournamentSummary, shouldPersist = true) {
				const requestId = ++tournamentRequestId;

					if (requestId !== tournamentRequestId) return;
					renderTournament(tournament, shouldPersist);
				} catch (error) {
					if (requestId !== tournamentRequestId) return;
					showTournamentError(error);
				}
			}

			// Initial render using saved tournament (if any)
			await loadAndRenderTournament(currentTournament, hasSelectedTournament);
			if (!hasSelectedTournament) {
				openTournamentModal();
			}

			// Handle select change
			fixtureSelect.addEventListener('change', (e) => {
				renderFixtureFor(e.target.value);
			});

			// Bootstrap 4 modal handling
			const modalEl = $('#matchModal');
			const modalContent = $('#matchModalContent');

			$('#matchModal, #tournamentModal').on('show.bs.modal', function() {
				document.body.classList.add('bottom-sheet-open');
			});

			$('#matchModal, #tournamentModal').on('hidden.bs.modal', function() {
				if (!document.querySelector('.modal.show')) {
					document.body.classList.remove('bottom-sheet-open');
				}
			});

			$(document).on('click', '.close-modal-btn', function(e) {
				e.preventDefault();
				e.stopPropagation();
				$(this).closest('.modal').modal('hide');
			});

			// Convert event type → HTML icon
			function renderEventIcon(type) {
				switch (type) {
					case 'goal': return '<i class="icon-svg icon-soccer-ball"></i>';
					case 'penalty_goal': return '<i class="icon-svg icon-soccer-ball"></i> (P)';
					case 'red_card': return '<i class="icon-svg icon-red-card"></i>';
					case 'yellow_card': return '<i class="icon-svg icon-yellow-card"></i>';
					default: return '';
				}
			}

			// Open modal dynamically
			function openMatchModal(matchData) {
				const t1 = matchData.team_1;
				const t2 = matchData.team_2;

				// Generate icons based on event type
				function getEventIcon(ev) {
					switch (ev.type) {
						case 'goal': return '<i class="icon-svg icon-soccer-ball"></i>';
						case 'penalty_goal': return '<i class="icon-svg icon-soccer-ball"></i>';
						case 'red_card': return '<i class="icon-svg icon-red-card"></i>';
						case 'yellow_card': return '<i class="icon-svg icon-yellow-card"></i>';
						default: return '';
					}
				}

				function escapeHtml(value) {
					return String(value || '')
						.replace(/&/g, '&amp;')
						.replace(/</g, '&lt;')
						.replace(/>/g, '&gt;')
						.replace(/"/g, '&quot;')
						.replace(/'/g, '&#039;');
				}

				function abbreviateLongPlayerName(name) {
					const cleanName = String(name || 'Jugador').trim().replace(/\s+/g, ' ');
					const parts = cleanName.split(' ');

					if (cleanName.length <= 15 || parts.length < 2) {
						return cleanName;
					}

					const lastPart = parts.pop();
					return `${parts.join(' ')} ${lastPart.charAt(0)}.`;
				}

				function normalizePlayerNameKey(name) {
					return String(name || '').trim().replace(/\s+/g, ' ').toLowerCase();
				}

				function playerNameKeys(name) {
					const key = normalizePlayerNameKey(name);
					if (!key) return [];

					const keys = [key];
					const reversedKey = key.split(' ').reverse().join(' ');
					if (reversedKey && reversedKey !== key) {
						keys.push(reversedKey);
					}

					return keys;
				}

				function findPlayerPhotoUrlForEvent(event) {
					const eventPlayerId = resolvePlayerId(event);
					const eventNameKeys = playerNameKeys(event?.player_name || event?.jugador);
					if (!eventPlayerId && !eventNameKeys.length) return "";

					const playerSources = []
						.concat(currentTournament.top_scorers || [])
						.concat(currentTournament.sanctions || [])
						.concat(currentTournament.suspended || []);

					if (eventPlayerId) {
						const matchById = playerSources.find(player =>
							resolvePlayerId(player, true) === eventPlayerId
						);
						if (matchById && matchById.player_photo_url) {
							return matchById.player_photo_url;
						}
					}

					const matchByName = playerSources.find(player =>
						eventNameKeys.includes(normalizePlayerNameKey(player.player_name || resolvePersonName(player)))
					);

					return matchByName && matchByName.player_photo_url ? matchByName.player_photo_url : "";
				}

				function renderTeamEvents(events, alignRight = false) {
					if (!events || !events.length) return '<em class="match-sheet__empty">Sin eventos</em>';

					return `
						<div class="alc-event-header-performances-list">
							${events.map(ev => {
								let text = abbreviateLongPlayerName(ev.player_name);
								if (ev.type === 'penalty_goal') text += ' (P)';
								const icon = getEventIcon(ev);
								const photoUrl = resolvePlayerPhotoUrl(
									ev.player_photo_url ||
									ev.jugador_foto_perfil ||
									ev.foto_perfil ||
									ev.foto ||
									ev.foto_url ||
									findPlayerPhotoUrlForEvent(ev)
								);
								const photo = `<img class="alc-event-header__performance-photo" src="${escapeHtml(photoUrl)}" alt="" onerror="this.src='${PLAYER_FALLBACK_PHOTO}'">`;
								const name = `<span class="alc-event-header__performance-name">${escapeHtml(text)}</span>`;

								return `
									<div class="alc-event-header__performance alc-event-header__performance--${alignRight ? 'right' : 'left'}">
										${icon}${photo}${name}
									</div>`;
							}).join('')}
						</div>`;
				}

				const modalHTML = `
					<div class="match-sheet">
						<div class="match-sheet__meta">
							<span class="match-sheet__stadium">${escapeHtml(matchData.stadium || 'Sin estadio')}</span>
							<span class="match-sheet__date">${escapeHtml(matchData.date_time || 'Horario a confirmar')}</span>
						</div>

						<div class="match-sheet__scoreboard">
							<div class="match-sheet__team">
								<img class="match-sheet__logo" src="${escapeHtml(t1.team_logo_url)}" alt="${escapeHtml(t1.team_name)}">
								<h4 class="match-sheet__team-name">${escapeHtml(t1.team_name)}</h4>
							</div>

							<div class="match-sheet__score" aria-label="${escapeHtml(t1.team_name)} ${t1.goals ?? '-'}, ${escapeHtml(t2.team_name)} ${t2.goals ?? '-'}">
								<span>${t1.goals ?? '-'}</span>
								<span class="match-sheet__score-separator">-</span>
								<span>${t2.goals ?? '-'}</span>
							</div>

							<div class="match-sheet__team">
								<img class="match-sheet__logo" src="${escapeHtml(t2.team_logo_url)}" alt="${escapeHtml(t2.team_name)}">
								<h4 class="match-sheet__team-name">${escapeHtml(t2.team_name)}</h4>
							</div>
						</div>

						<div class="match-sheet__events">
							<div class="match-sheet__events-column">
								<h5 class="match-sheet__events-title">${escapeHtml(t1.team_name)}</h5>
								${renderTeamEvents(t1.events)}
							</div>
							<div class="match-sheet__events-column">
								<h5 class="match-sheet__events-title">${escapeHtml(t2.team_name)}</h5>
								${renderTeamEvents(t2.events, true)}
							</div>
						</div>
					</div>`;
				modalContent.html(modalHTML);
				modalEl.modal('show');
			}

			// Click listener for all matches (finished or pending)
			document.getElementById('fixtures-list').addEventListener('click', e => {
				const item = e.target.closest('.widget-results__item');
				if (!item) return;

				const matchData = JSON.parse(item.dataset.match);
				openMatchModal(matchData);
			});

			// Open tournament modal
			$('#appTournamentPill').on('click', function(e) {
				e.preventDefault();
				e.stopPropagation();
				openTournamentModal();
			});

			// Close modal button
			$(document).on('click', '#tournamentModal .close-modal-btn', function() {
				tournamentModal.modal('hide');
			});

			// Tournament selection
			$(document).on('click', '.tournament-item', function(e) {
				e.preventDefault();
				e.stopPropagation();
				e.stopImmediatePropagation();
				const tournamentId = $(this).data('id');
				const selectedTournament = tournaments.find(t => String(t.tournament_id) === String(tournamentId));
				if (!selectedTournament) return;

				tournamentModal.modal('hide');
				loadAndRenderTournament(selectedTournament);
			});

			// Navigate deeper into nested categories
			$(document).on('click', '.nav-category-item', function(e) {
				e.preventDefault();
				e.stopPropagation();
				e.stopImmediatePropagation();
				const nodeIndex = Number($(this).data('idx'));
				const currentLevel = navStack[navStack.length - 1] || { nodes: [] };
				const nextNode = (currentLevel.nodes || [])[nodeIndex];
				const categoryText = String((nextNode && nextNode.text) || "Categoría");
				const children = nodeChildren(nextNode);
				if (!children.length) return;

				navStack.push({ title: categoryText, nodes: children });
				renderNavLevel();
			});

			// Back to previous nav level
			$(document).on('click', '#tournamentBackBtn', function(e) {
				e.preventDefault();
				e.stopPropagation();
				e.stopImmediatePropagation();
				if (navStack.length <= 1) return;
				navStack.pop();
				renderNavLevel();
			});

			const cards = document.querySelectorAll(".card-container");
			const bottomNavItems = document.querySelectorAll(".app-bottom-nav__item");
			const appSubtabGroups = document.querySelectorAll(".app-subtabs");
			const appSubtabs = document.querySelectorAll(".app-subtab");
			const sectionDefaults = {
				standings: "standings",
				stats: "top-scorers",
				fairplay: "suspended",
				fixture: "fixture"
			};

			function hideAllCards() {
				cards.forEach(card => {
					card.style.display = "none";
				});
			}

			function showCard(cardKey) {
				const cardToShow = document.querySelector(`.card-container.${cardKey}`);
				if (cardToShow) {
					cardToShow.style.display = "block";
				}
			}

			function setActiveSubtab(section, target) {
				appSubtabs.forEach(tab => {
					const isCurrent = tab.dataset.section === section && tab.dataset.target === target;
					tab.classList.toggle("is-active", isCurrent);
				});
			}

			function showSection(section, target) {
				const cardKey = target || sectionDefaults[section] || "standings";

				hideAllCards();
				showCard(cardKey);

				bottomNavItems.forEach(item => {
					item.classList.toggle("is-active", item.dataset.section === section);
				});

				appSubtabGroups.forEach(group => {
					group.hidden = group.dataset.section !== section;
				});

				if (section === "stats" || section === "fairplay") {
					setActiveSubtab(section, cardKey);
				}
			}

			bottomNavItems.forEach(item => {
				item.addEventListener("click", () => {
					showSection(item.dataset.section);
				});
			});

			appSubtabs.forEach(tab => {
				tab.addEventListener("click", () => {
					showSection(tab.dataset.section, tab.dataset.target);
				});
			});

			showSection("standings");
		});

		$(document).on('show.bs.modal', function (e) {
			$('.modal').not($(e.target)).modal('hide');
		});

		document.addEventListener('click', function (e) {
			const path = typeof e.composedPath === "function" ? e.composedPath() : [];
			const clickedInsideDialog = path.some(node =>
				node && node.classList && node.classList.contains('modal-dialog')
			);

			// Keep modal open when clicking inside any modal dialog.
			if (clickedInsideDialog) {
				return;
			}

			document.querySelectorAll('.modal.show').forEach(modal => {
				$(modal).modal('hide');
			});
		});
	</script>

</body>
</html>
